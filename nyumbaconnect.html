<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NyumbaConnect - Tanzania's Rental Marketplace</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #FAF7F2; font-family: Georgia, serif; }
    #root { display: flex; justify-content: center; min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const theme = {
      primary: "#C8522A", accent: "#F5A623", bg: "#FAF7F2", card: "#FFFFFF",
      text: "#1A1208", textMuted: "#7A6A55", border: "#E8DDD0", success: "#2D8A4E", surface: "#F2EBE0",
    };
    const UNLOCK_FEE = 3000;
    const fmt = (n) => `TZS ${Number(n).toLocaleString()}`;

    const DEMO_LISTINGS = [
      { id:1, title:"Modern 2BR Apartment", location:"Kinondoni, Dar es Salaam", price:350000, rooms:2, type:"Apartment", image:"https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=400&q=80", amenities:["Water","Security","Parking"], landlord:"Hassan Juma", contact:"+255 712 345 678", views:47, inquiries:12 },
      { id:2, title:"Spacious 3BR House", location:"Mbezi Beach, Dar es Salaam", price:600000, rooms:3, type:"House", image:"https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=400&q=80", amenities:["Garden","Water","Security"], landlord:"Amina Rashid", contact:"+255 754 987 321", views:33, inquiries:8 },
      { id:3, title:"Cozy Studio Room", location:"Mwanza City Centre", price:150000, rooms:1, type:"Studio", image:"https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=400&q=80", amenities:["Water","WiFi"], landlord:"Peter Mwangi", contact:"+255 769 111 222", views:21, inquiries:5 },
      { id:4, title:"Executive 4BR Villa", location:"Masaki, Dar es Salaam", price:1200000, rooms:4, type:"Villa", image:"https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=400&q=80", amenities:["Pool","Security","Parking","Garden"], landlord:"Grace Kimaro", contact:"+255 786 444 555", views:89, inquiries:20 },
    ];

    const S = {
      phone: { width:"100%", maxWidth:400, minHeight:"100vh", margin:"0 auto", background:theme.bg, fontFamily:"Georgia,serif", position:"relative", overflowX:"hidden" },
      header: { background:theme.primary, padding:"36px 20px 20px", color:"#fff" },
      headerTitle: { fontSize:20, fontWeight:"bold", letterSpacing:-0.5 },
      headerSub: { fontSize:12, opacity:0.8, marginTop:2 },
      card: { background:theme.card, borderRadius:16, overflow:"hidden", boxShadow:"0 2px 12px rgba(0,0,0,0.08)", marginBottom:14 },
      btn: { background:theme.primary, color:"#fff", border:"none", borderRadius:12, padding:"13px 24px", fontSize:14, fontWeight:"bold", cursor:"pointer", width:"100%", fontFamily:"Georgia,serif" },
      btnOutline: { background:"transparent", color:theme.primary, border:`2px solid ${theme.primary}`, borderRadius:12, padding:"12px 24px", fontSize:14, fontWeight:"bold", cursor:"pointer", width:"100%", fontFamily:"Georgia,serif" },
      input: { width:"100%", border:`1.5px solid ${theme.border}`, borderRadius:10, padding:"11px 14px", fontSize:13, background:theme.bg, color:theme.text, fontFamily:"Georgia,serif", boxSizing:"border-box", outline:"none" },
      label: { fontSize:11, fontWeight:"bold", color:theme.textMuted, textTransform:"uppercase", letterSpacing:0.8, marginBottom:5, display:"block" },
      tag: { background:theme.surface, color:theme.primary, borderRadius:20, padding:"3px 10px", fontSize:11, fontWeight:"bold" },
      bottomNav: { position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:400, background:"#fff", borderTop:`1px solid ${theme.border}`, display:"flex", zIndex:100 },
      navItem: (a) => ({ flex:1, padding:"10px 0", textAlign:"center", cursor:"pointer", color:a?theme.primary:theme.textMuted, fontSize:10, fontWeight:a?"bold":"normal" }),
    };

    function LogoIcon({ size=36 }) {
      return (
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width={size} height={size}>
          <defs><linearGradient id="ig" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style={{stopColor:"#C8522A"}}/><stop offset="100%" style={{stopColor:"#9A3A1A"}}/></linearGradient></defs>
          <rect width="80" height="80" rx="18" fill="url(#ig)"/>
          <polygon points="15,46 40,22 65,46" fill="#fff" opacity="0.95"/>
          <rect x="20" y="44" width="40" height="26" rx="3" fill="#fff" opacity="0.95"/>
          <rect x="33" y="54" width="14" height="16" rx="3" fill="#F5A623"/>
          <circle cx="40" cy="20" r="6" fill="#F5A623"/>
          <circle cx="40" cy="20" r="3" fill="#fff"/>
        </svg>
      );
    }

    function Toast({ msg, onClose }) {
      useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
      return <div style={{ position:"fixed", top:50, left:"50%", transform:"translateX(-50%)", background:theme.success, color:"#fff", padding:"10px 22px", borderRadius:20, fontWeight:"bold", fontSize:13, zIndex:999, whiteSpace:"nowrap", boxShadow:"0 4px 20px rgba(0,0,0,0.2)" }}>{msg}</div>;
    }

    function App() {
      const [screen, setScreen] = useState("splash");
      const [role, setRole] = useState(null);
      const [listings, setListings] = useState(DEMO_LISTINGS);
      const [search, setSearch] = useState("");
      const [filterPrice, setFilterPrice] = useState("");
      const [filterRooms, setFilterRooms] = useState("");
      const [selected, setSelected] = useState(null);
      const [balance, setBalance] = useState(10000);
      const [unlockedIds, setUnlockedIds] = useState([]);
      const [showPay, setShowPay] = useState(false);
      const [toast, setToast] = useState(null);
      const [activeTab, setActiveTab] = useState("search");
      const [dashTab, setDashTab] = useState("listings");
      const [newL, setNewL] = useState({ title:"", location:"", price:"", rooms:"", type:"Apartment", contact:"" });
      const [imgPreview, setImgPreview] = useState(null);
      const fileRef = useRef();

      const isUnlocked = (id) => unlockedIds.includes(id);
      const filtered = listings.filter(l => {
        const ms = l.title.toLowerCase().includes(search.toLowerCase()) || l.location.toLowerCase().includes(search.toLowerCase());
        const mp = filterPrice ? l.price <= parseInt(filterPrice) : true;
        const mr = filterRooms ? l.rooms === parseInt(filterRooms) : true;
        return ms && mp && mr;
      });

      const handleUnlock = () => {
        if (balance < UNLOCK_FEE) { setToast("⚠️ Insufficient balance"); return; }
        setBalance(b => b - UNLOCK_FEE);
        setUnlockedIds(ids => [...ids, selected.id]);
        setShowPay(false);
        setToast("✅ Contact unlocked!");
      };

      const handlePost = () => {
        if (!newL.title || !newL.location || !newL.price || !newL.contact) { setToast("⚠️ Fill all required fields"); return; }
        const listing = { id:Date.now(), title:newL.title, location:newL.location, price:parseInt(newL.price), rooms:parseInt(newL.rooms)||1, type:newL.type, contact:newL.contact, image:imgPreview||"https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=400&q=80", landlord:"You", amenities:["Water"], views:0, inquiries:0 };
        setListings(ls => [listing, ...ls]);
        setNewL({ title:"", location:"", price:"", rooms:"", type:"Apartment", contact:"" });
        setImgPreview(null);
        setToast("✅ Property posted!");
        setDashTab("listings");
      };

      // SPLASH
      if (screen === "splash") return (
        <div style={{ ...S.phone, background:theme.primary, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:32, minHeight:"100vh" }}>
          {toast && <Toast msg={toast} onClose={() => setToast(null)}/>}
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="280" height="112" style={{marginBottom:32}}>
            <defs>
              <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style={{stopColor:"#fff",stopOpacity:0.9}}/><stop offset="100%" style={{stopColor:"#fff",stopOpacity:0.7}}/></linearGradient>
              <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style={{stopColor:"#F5A623"}}/><stop offset="100%" style={{stopColor:"#E8904A"}}/></linearGradient>
            </defs>
            <polygon points="30,90 80,45 130,90" fill="url(#hg)"/>
            <rect x="40" y="88" width="80" height="55" rx="4" fill="url(#hg)"/>
            <rect x="68" y="108" width="24" height="35" rx="4" fill="#F5A623"/>
            <circle cx="80" cy="42" r="7" fill="#F5A623"/>
            <circle cx="80" cy="42" r="3.5" fill="#fff"/>
            <text x="148" y="88" fontFamily="Georgia,serif" fontSize="38" fontWeight="bold" fill="#fff" letterSpacing="-1">Nyumba</text>
            <text x="148" y="125" fontFamily="Georgia,serif" fontSize="38" fontWeight="bold" fill="#F5A623" letterSpacing="-1">Connect</text>
            <text x="150" y="148" fontFamily="Georgia,serif" fontSize="11" fill="rgba(255,255,255,0.7)" letterSpacing="2">TANZANIA'S RENTAL MARKETPLACE</text>
            <rect x="148" y="132" width="240" height="3" rx="2" fill="url(#ag)"/>
          </svg>
          <div style={{ width:"100%", display:"flex", flexDirection:"column", gap:12 }}>
            <button style={{ ...S.btn, background:"#fff", color:theme.primary }} onClick={() => { setRole("tenant"); setScreen("home"); setActiveTab("search"); }}>🔍  I'm Looking for a House</button>
            <button style={{ ...S.btnOutline, borderColor:"#fff", color:"#fff" }} onClick={() => { setRole("landlord"); setScreen("dashboard"); setDashTab("listings"); }}>🏘️  I'm a Landlord</button>
          </div>
          <div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", marginTop:28, textAlign:"center" }}>🇹🇿 Connecting landlords & tenants across Tanzania</div>
        </div>
      );

      // DETAIL
      if (screen === "detail" && selected) {
        const unlocked = isUnlocked(selected.id);
        return (
          <div style={S.phone}>
            {toast && <Toast msg={toast} onClose={() => setToast(null)}/>}
            <div style={{ position:"relative" }}>
              <img src={selected.image} alt={selected.title} style={{ width:"100%", height:220, objectFit:"cover", display:"block" }}/>
              <button onClick={() => setScreen("home")} style={{ position:"absolute", top:40, left:16, background:"rgba(0,0,0,0.5)", color:"#fff", border:"none", borderRadius:20, padding:"7px 14px", fontSize:13, cursor:"pointer" }}>← Back</button>
              <div style={{ position:"absolute", top:40, right:16, background:theme.accent, borderRadius:20, padding:"5px 12px", fontSize:11, fontWeight:"bold", color:"#fff" }}>{selected.type}</div>
            </div>
            <div style={{ padding:18, paddingBottom:40 }}>
              <div style={{ fontSize:20, fontWeight:"bold", color:theme.text }}>{selected.title}</div>
              <div style={{ color:theme.textMuted, fontSize:13, marginTop:4 }}>📍 {selected.location}</div>
              <div style={{ display:"flex", justifyContent:"space-between", background:theme.surface, borderRadius:12, padding:14, marginTop:14 }}>
                <div><div style={{ fontSize:10, color:theme.textMuted, fontWeight:"bold" }}>MONTHLY RENT</div><div style={{ fontSize:22, fontWeight:"bold", color:theme.primary }}>{fmt(selected.price)}</div></div>
                <div style={{ textAlign:"right" }}><div style={{ fontSize:10, color:theme.textMuted, fontWeight:"bold" }}>BEDROOMS</div><div style={{ fontSize:22, fontWeight:"bold" }}>{selected.rooms} 🛏️</div></div>
              </div>
              <div style={{ marginTop:14, display:"flex", gap:6, flexWrap:"wrap" }}>
                {selected.amenities.map(a => <span key={a} style={S.tag}>✓ {a}</span>)}
              </div>
              <div style={{ marginTop:18 }}>
                {unlocked ? (
                  <div style={{ background:"#E8F5ED", borderRadius:12, padding:16, border:"2px solid #2D8A4E" }}>
                    <div style={{ fontSize:11, fontWeight:"bold", color:theme.success, marginBottom:6 }}>✅ CONTACT UNLOCKED</div>
                    <div style={{ fontSize:16, fontWeight:"bold", color:theme.text }}>📞 {selected.contact}</div>
                    <div style={{ fontSize:13, color:theme.textMuted, marginTop:6 }}>Posted by: {selected.landlord}</div>
                    <div style={{ fontSize:12, color:theme.textMuted, marginTop:4 }}>💬 WhatsApp available</div>
                  </div>
                ) : (
                  <>
                    <div style={{ background:"#FFF8E7", borderRadius:12, padding:14, marginBottom:12, border:`1px solid ${theme.accent}` }}>
                      <div style={{ fontSize:13 }}>🔒 Pay to see landlord contact details</div>
                      <div style={{ fontSize:13, fontWeight:"bold", color:theme.primary, marginTop:4 }}>Unlock fee: {fmt(UNLOCK_FEE)}</div>
                    </div>
                    <button style={S.btn} onClick={() => setShowPay(true)}>🔓 Unlock Contact — {fmt(UNLOCK_FEE)}</button>
                  </>
                )}
              </div>
            </div>
            {showPay && (
              <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", zIndex:200, display:"flex", alignItems:"flex-end", justifyContent:"center" }}>
                <div style={{ background:"#fff", borderRadius:"24px 24px 0 0", padding:26, width:"100%", maxWidth:400 }}>
                  <div style={{ fontWeight:"bold", fontSize:17, marginBottom:4 }}>Unlock Contact</div>
                  <div style={{ fontSize:12, color:theme.textMuted, marginBottom:18 }}>Pay via mobile money</div>
                  <div style={{ background:theme.surface, borderRadius:12, padding:14, marginBottom:18 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}><span style={{ color:theme.textMuted, fontSize:13 }}>Fee</span><span style={{ fontWeight:"bold" }}>{fmt(UNLOCK_FEE)}</span></div>
                    <div style={{ display:"flex", justifyContent:"space-between" }}><span style={{ color:theme.textMuted, fontSize:13 }}>Balance</span><span style={{ fontWeight:"bold", color:theme.success }}>{fmt(balance)}</span></div>
                  </div>
                  <div style={{ fontSize:11, color:theme.textMuted, textAlign:"center", marginBottom:14 }}>💳 M-Pesa · Tigo Pesa · Airtel Money</div>
                  <div style={{ display:"flex", gap:10 }}>
                    <button style={{ ...S.btnOutline, flex:1 }} onClick={() => setShowPay(false)}>Cancel</button>
                    <button style={{ ...S.btn, flex:1 }} onClick={handleUnlock}>Pay & Unlock</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      // TENANT
      if (role === "tenant") return (
        <div style={S.phone}>
          {toast && <Toast msg={toast} onClose={() => setToast(null)}/>}
          {activeTab === "search" && <>
            <div style={{ ...S.header, paddingBottom:20 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <LogoIcon size={34}/>
                  <div><div style={S.headerTitle}>NyumbaConnect</div><div style={S.headerSub}>Find your perfect home</div></div>
                </div>
                <div style={{ background:"rgba(255,255,255,0.2)", borderRadius:20, padding:"5px 10px", fontSize:11, color:"#fff" }}>💰 {fmt(balance)}</div>
              </div>
              <input style={{ ...S.input, marginTop:14, background:"#fff" }} placeholder="🔍  Search location or name..." value={search} onChange={e => setSearch(e.target.value)}/>
            </div>
            <div style={{ padding:"12px 16px 0", display:"flex", gap:8 }}>
              <select style={{ ...S.input, flex:1 }} value={filterRooms} onChange={e => setFilterRooms(e.target.value)}>
                <option value="">Any rooms</option>
                {[1,2,3,4].map(n => <option key={n} value={n}>{n} room{n>1?"s":""}</option>)}
              </select>
              <select style={{ ...S.input, flex:1 }} value={filterPrice} onChange={e => setFilterPrice(e.target.value)}>
                <option value="">Any price</option>
                <option value="200000">Under 200k</option>
                <option value="500000">Under 500k</option>
                <option value="1000000">Under 1M</option>
              </select>
            </div>
            <div style={{ padding:"10px 16px 100px" }}>
              <div style={{ fontSize:12, color:theme.textMuted, marginBottom:10, fontWeight:"bold" }}>{filtered.length} properties found</div>
              {filtered.map(l => (
                <div key={l.id} style={S.card} onClick={() => { setSelected(l); setShowPay(false); setScreen("detail"); }}>
                  <div style={{ position:"relative" }}>
                    <img src={l.image} alt={l.title} style={{ width:"100%", height:170, objectFit:"cover", display:"block" }}/>
                    <div style={{ position:"absolute", top:10, right:10, background:theme.primary, color:"#fff", borderRadius:20, padding:"3px 10px", fontSize:11, fontWeight:"bold" }}>{fmt(l.price)}/mo</div>
                    {isUnlocked(l.id) && <div style={{ position:"absolute", top:10, left:10, background:theme.success, color:"#fff", borderRadius:20, padding:"3px 10px", fontSize:10, fontWeight:"bold" }}>✓ Unlocked</div>}
                  </div>
                  <div style={{ padding:12 }}>
                    <div style={{ fontWeight:"bold", fontSize:15, color:theme.text }}>{l.title}</div>
                    <div style={{ color:theme.textMuted, fontSize:12, marginTop:2 }}>📍 {l.location}</div>
                    <div style={{ display:"flex", gap:6, marginTop:8 }}>
                      <span style={S.tag}>{l.rooms} 🛏️</span>
                      <span style={S.tag}>{l.type}</span>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </>}
          {activeTab === "profile" && (
            <div>
              <div style={S.header}><div style={S.headerTitle}>My Account</div></div>
              <div style={{ padding:16, paddingBottom:100 }}>
                <div style={{ ...S.card, padding:20, textAlign:"center" }}>
                  <div style={{ width:64, height:64, borderRadius:32, background:theme.primary, color:"#fff", fontSize:26, display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 10px" }}>T</div>
                  <div style={{ fontWeight:"bold", fontSize:17 }}>Tenant User</div>
                </div>
                <div style={{ ...S.card, padding:16 }}>
                  <div style={S.label}>Wallet Balance</div>
                  <div style={{ fontSize:26, fontWeight:"bold", color:theme.primary }}>{fmt(balance)}</div>
                  <button style={{ ...S.btn, marginTop:10 }}>+ Top Up via Mobile Money</button>
                </div>
                <div style={{ ...S.card, padding:16 }}>
                  <div style={S.label}>Unlocked Listings</div>
                  <div style={{ color:theme.textMuted, fontSize:13 }}>{unlockedIds.length} contact{unlockedIds.length!==1?"s":""} unlocked</div>
                </div>
                <button style={{ ...S.btnOutline, marginTop:10 }} onClick={() => setScreen("splash")}>← Switch Role</button>
              </div>
            </div>
          )}
          <div style={S.bottomNav}>
            {[["search","🔍","Search"],["profile","👤","Profile"]].map(([tab,icon,label]) => (
              <div key={tab} style={S.navItem(activeTab===tab)} onClick={() => setActiveTab(tab)}>
                <div style={{ fontSize:20 }}>{icon}</div><div>{label}</div>
              </div>
            ))}
          </div>
        </div>
      );

      // LANDLORD
      if (role === "landlord") return (
        <div style={S.phone}>
          {toast && <Toast msg={toast} onClose={() => setToast(null)}/>}
          <div style={{ ...S.header, paddingBottom:14 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <LogoIcon size={34}/>
                <div><div style={S.headerTitle}>Landlord Dashboard</div><div style={S.headerSub}>Manage your properties</div></div>
              </div>
              <button onClick={() => setScreen("splash")} style={{ background:"rgba(255,255,255,0.2)", color:"#fff", border:"none", borderRadius:20, padding:"5px 12px", fontSize:11, cursor:"pointer" }}>← Back</button>
            </div>
            <div style={{ display:"flex", gap:8, marginTop:14 }}>
              {[["listings","My Listings"],["post","Post New"],["stats","Stats"]].map(([tab,label]) => (
                <button key={tab} onClick={() => setDashTab(tab)} style={{ flex:1, padding:"7px 0", borderRadius:20, border:"none", background:dashTab===tab?"#fff":"rgba(255,255,255,0.2)", color:dashTab===tab?theme.primary:"#fff", fontWeight:"bold", fontSize:11, cursor:"pointer", fontFamily:"Georgia,serif" }}>{label}</button>
              ))}
            </div>
          </div>
          <div style={{ padding:16, paddingBottom:40 }}>
            {dashTab === "listings" && (
              listings.length === 0 ? (
                <div style={{ textAlign:"center", padding:40, color:theme.textMuted }}>
                  <div style={{ fontSize:40 }}>🏠</div>
                  <div style={{ marginTop:8 }}>No listings yet.</div>
                  <button style={{ ...S.btn, marginTop:14 }} onClick={() => setDashTab("post")}>+ Post Now</button>
                </div>
              ) : (
                <>
                  {listings.map(l => (
                    <div key={l.id} style={{ ...S.card, padding:14 }}>
                      <div style={{ display:"flex", gap:12 }}>
                        <img src={l.image} style={{ width:68, height:68, borderRadius:10, objectFit:"cover" }}/>
                        <div style={{ flex:1 }}>
                          <div style={{ fontWeight:"bold", fontSize:14 }}>{l.title}</div>
                          <div style={{ color:theme.textMuted, fontSize:12 }}>📍 {l.location}</div>
                          <div style={{ color:theme.primary, fontWeight:"bold", fontSize:13, marginTop:3 }}>{fmt(l.price)}/mo</div>
                        </div>
                      </div>
                      <div style={{ display:"flex", gap:18, marginTop:10, paddingTop:10, borderTop:`1px solid ${theme.border}` }}>
                        <div style={{ textAlign:"center" }}><div style={{ fontSize:17, fontWeight:"bold" }}>{l.views||0}</div><div style={{ fontSize:10, color:theme.textMuted }}>Views</div></div>
                        <div style={{ textAlign:"center" }}><div style={{ fontSize:17, fontWeight:"bold", color:theme.primary }}>{l.inquiries||0}</div><div style={{ fontSize:10, color:theme.textMuted }}>Inquiries</div></div>
                      </div>
                    </div>
                  ))}
                  <button style={S.btn} onClick={() => setDashTab("post")}>+ Post New Listing</button>
                </>
              )
            )}
            {dashTab === "post" && (
              <div>
                <div style={{ fontWeight:"bold", fontSize:17, marginBottom:16 }}>Post a New Property</div>
                {[
                  { label:"Property Title *", key:"title", placeholder:"e.g. 2BR Apartment in Kinondoni" },
                  { label:"Location *", key:"location", placeholder:"e.g. Kinondoni, Dar es Salaam" },
                  { label:"Monthly Rent (TZS) *", key:"price", placeholder:"e.g. 350000", type:"number" },
                  { label:"Number of Rooms", key:"rooms", placeholder:"e.g. 2", type:"number" },
                  { label:"Contact Number *", key:"contact", placeholder:"e.g. +255 712 345 678" },
                ].map(({ label, key, placeholder, type }) => (
                  <div key={key} style={{ marginBottom:14 }}>
                    <label style={S.label}>{label}</label>
                    <input style={S.input} type={type||"text"} placeholder={placeholder} value={newL[key]} onChange={e => setNewL({...newL,[key]:e.target.value})}/>
                  </div>
                ))}
                <div style={{ marginBottom:14 }}>
                  <label style={S.label}>Property Type</label>
                  <select style={S.input} value={newL.type} onChange={e => setNewL({...newL,type:e.target.value})}>
                    {["Apartment","House","Studio","Villa","Bedsitter"].map(t => <option key={t}>{t}</option>)}
                  </select>
                </div>
                <div style={{ marginBottom:18 }}>
                  <label style={S.label}>Property Photo</label>
                  <input type="file" accept="image/*" ref={fileRef} style={{ display:"none" }} onChange={e => {
                    const file = e.target.files[0]; if (!file) return;
                    const reader = new FileReader();
                    reader.onload = ev => setImgPreview(ev.target.result);
                    reader.readAsDataURL(file);
                  }}/>
                  {imgPreview ? (
                    <div style={{ position:"relative" }}>
                      <img src={imgPreview} style={{ width:"100%", height:150, objectFit:"cover", borderRadius:12 }}/>
                      <button onClick={() => setImgPreview(null)} style={{ position:"absolute", top:8, right:8, background:"rgba(0,0,0,0.6)", color:"#fff", border:"none", borderRadius:20, padding:"4px 10px", cursor:"pointer" }}>✕</button>
                    </div>
                  ) : (
                    <div onClick={() => fileRef.current.click()} style={{ border:`2px dashed ${theme.border}`, borderRadius:12, padding:28, textAlign:"center", color:theme.textMuted, cursor:"pointer", background:theme.surface }}>
                      📸 Tap to upload photo<br/><span style={{ fontSize:11 }}>JPEG or PNG</span>
                    </div>
                  )}
                </div>
                <div style={{ background:"#FFF8E7", borderRadius:12, padding:12, marginBottom:14, border:`1px solid ${theme.accent}` }}>
                  <div style={{ fontSize:12 }}>💡 <strong>FREE</strong> basic listing. Boost for {fmt(5000)} to appear at top.</div>
                </div>
                <button style={S.btn} onClick={handlePost}>🏘️ Post My Property</button>
              </div>
            )}
            {dashTab === "stats" && (
              <div>
                <div style={{ fontWeight:"bold", fontSize:17, marginBottom:14 }}>Your Performance</div>
                {[
                  { label:"Total Listings", value:listings.length, icon:"🏠", color:theme.primary },
                  { label:"Total Views", value:listings.reduce((s,l)=>s+(l.views||0),0), icon:"👁️", color:"#5B7FBF" },
                  { label:"Total Inquiries", value:listings.reduce((s,l)=>s+(l.inquiries||0),0), icon:"📞", color:theme.success },
                  { label:"Est. Earnings", value:fmt(listings.reduce((s,l)=>s+(l.inquiries||0),0)*UNLOCK_FEE*0.7), icon:"💰", color:theme.accent },
                ].map(({ label, value, icon, color }) => (
                  <div key={label} style={{ ...S.card, padding:14, display:"flex", alignItems:"center", gap:14 }}>
                    <div style={{ width:44, height:44, borderRadius:22, background:color+"20", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20 }}>{icon}</div>
                    <div><div style={{ fontSize:20, fontWeight:"bold" }}>{value}</div><div style={{ fontSize:12, color:theme.textMuted }}>{label}</div></div>
                  </div>
                ))}
                <button style={{ ...S.btnOutline, marginTop:10 }} onClick={() => setScreen("splash")}>← Switch Role</button>
              </div>
            )}
          </div>
        </div>
      );

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
